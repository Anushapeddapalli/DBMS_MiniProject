<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;

    /* 🔥 Background image */
    background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1920") no-repeat center center fixed;
    background-size: cover;
  }

  /* Dark overlay for readability */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: -1;
  }

  .auth-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 80px;
    padding-bottom: 40px;
    box-sizing: border-box;
  }

  .auth-logo {
    width: 340px;   /* logo size unchanged */
    height: auto;
    margin-bottom: 6px;
    display: block;
  }

  .form-box {
    width: 380px;

    /* ✨ Glass / transparent effect */
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
  }

  .form-box h3 {
    margin-top: 10px;
    margin-bottom: 20px;
    color: #fff;
  }

  .form-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: none;
    font-size: 15px;
    outline: none;
  }

  .form-box button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #ff2d7a;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  .form-box button:hover {
    background: #e0266b;
  }

  #message {
    margin-top: 10px;
    color: #ffd1dc;
    font-weight: bold;
  }

  .form-box a {
    color: #fff;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="auth-container">
  <!-- LOGO (size unchanged) -->
  <img src="logo.png" alt="Logo" class="auth-logo">

  <!-- LOGIN BOX (now closer to logo) -->
  <div class="form-box">
    <h3>Welcome Back</h3>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <p id="message"></p>

    <p>
      Don't have an account?
      <a href="register.html">Create one</a>
    </p>
  </div>
</div>

<script>
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    if (!email || !password) {
      msg.innerText = "All fields are required";
      return;
    }

    if (!isValidEmail(email)) {
      msg.innerText = "Please enter a valid email address";
      return;
    }

    if (password.length < 6) {
      msg.innerText = "Password must be at least 6 characters";
      return;
    }

    fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        msg.innerText = data.error;
      } else {
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "index.html";
      }
    })
    .catch(() => {
      msg.innerText = "Login error";
    });
  }
</script>

</body>
</html>
