<!DOCTYPE html>
<html>
<head>
  <title>Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>🍴 Tasty Bites</span>
  </div>
</header>

<div class="container">
  <h3>Food Items</h3>
  <ul id="menuList"></ul>

  <h3>🛒 Cart</h3>
  <ul id="cartList"></ul>

  <h3 id="totalAmount">Total: ₹0</h3>

  <button onclick="goToOrder()">Place Order</button>
</div>

<script>
  // Cart: { menu_id: { name, price, qty } }
  const cart = {};

  // Get restaurant id from URL
  const params = new URLSearchParams(window.location.search);
  const rid = params.get("rid");

  console.log("Restaurant ID:", rid);

  // Load menu
  fetch(`/menu/${rid}`)
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("menuList");
      list.innerHTML = "";

      if (data.length === 0) {
        const li = document.createElement("li");
        li.textContent = "No menu available for this restaurant yet 😔";
        list.appendChild(li);
        return;
      }

      data.forEach(item => {
        const li = document.createElement("li");

        const nameSpan = document.createElement("span");
        nameSpan.textContent = item.name + " - ₹" + item.price;

        const btn = document.createElement("button");
        btn.textContent = "Add to Cart";
        btn.onclick = () => addToCart(item);

        li.appendChild(nameSpan);
        li.appendChild(btn);
        list.appendChild(li);
      });
    })
    .catch(err => {
      console.error("Error loading menu:", err);
      alert("Error loading menu. Check console.");
    });

  function addToCart(item) {
    if (cart[item.menu_id]) {
      cart[item.menu_id].qty += 1;
    } else {
      cart[item.menu_id] = {
        name: item.name,
        price: item.price,
        qty: 1
      };
    }
    renderCart();
  }

  function changeQty(menuId, delta) {
    cart[menuId].qty += delta;
    if (cart[menuId].qty <= 0) {
      delete cart[menuId];
    }
    renderCart();
  }

  function renderCart() {
    const cartList = document.getElementById("cartList");
    cartList.innerHTML = "";

    let total = 0;

    Object.keys(cart).forEach(menuId => {
      const item = cart[menuId];
      const li = document.createElement("li");

      const text = document.createElement("span");
      text.textContent = `${item.name} - ₹${item.price} x ${item.qty}`;

      const minusBtn = document.createElement("button");
      minusBtn.textContent = "−";
      minusBtn.onclick = () => changeQty(menuId, -1);

      const plusBtn = document.createElement("button");
      plusBtn.textContent = "+";
      plusBtn.onclick = () => changeQty(menuId, 1);

      li.appendChild(text);
      li.appendChild(minusBtn);
      li.appendChild(plusBtn);

      cartList.appendChild(li);

      total += item.price * item.qty;
    });

    document.getElementById("totalAmount").textContent = "Total: ₹" + total;
  }

  function goToOrder() {
    localStorage.setItem("cart", JSON.stringify(cart));
    localStorage.setItem("currentRestaurant", rid);
    window.location.href = "order.html";
  }
</script>

</body>
</html>
