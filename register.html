<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;

      /* 🔥 Same food background */
      background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1920") no-repeat center center fixed;
      background-size: cover;
    }

    /* Dark overlay for readability */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: -1;
    }

    header {
      padding: 15px 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
    }

    .logo img {
      height: 40px;
    }

    .container {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
      padding-bottom: 40px;
    }

    .form-box {
      width: 380px;

      /* ✨ Glass effect */
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }

    .form-box h3 {
      margin-top: 10px;
      margin-bottom: 20px;
      color: #fff;
    }

    .form-box input,
    .form-box button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      font-size: 15px;
    }

    .form-box input {
      border: none;
      outline: none;
    }

    .form-box button {
      border: none;
      background: #ff2d7a;
      color: white;
      cursor: pointer;
    }

    .form-box button:hover {
      background: #e0266b;
    }

    #message {
      margin-top: 10px;
      color: #ffd1dc;
      font-weight: bold;
    }

    .form-box a {
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>🍴 Tasty Bites</span>
  </div>
</header>

<div class="container">
  <div class="form-box">
    <h3>Join Us</h3>

    <input type="text" id="name" placeholder="Name" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password (min 6 chars)" />

    <button onclick="register()">Create Account</button>

    <p id="message"></p>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>
</div>

<script>
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function register() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    if (!name || !email || !password) {
      msg.innerText = "All fields are required";
      return;
    }

    if (!isValidEmail(email)) {
      msg.innerText = "Please enter a valid email address";
      return;
    }

    if (password.length < 6) {
      msg.innerText = "Password must be at least 6 characters";
      return;
    }

    fetch("/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        msg.innerText = data.error;
      } else {
        msg.innerText = "Account created! Please login.";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      }
    })
    .catch(() => {
      msg.innerText = "Registration error";
    });
  }
</script>

</body>
</html>
